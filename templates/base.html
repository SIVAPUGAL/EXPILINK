<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ExpiLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{ --bg-grad-start:#020617; --bg-grad-end:#030B25; --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08); --glass-radius:24px; --glass-blur:25px; --cyan:#3EE7FF; --text:#F8FAFC; --muted:rgba(255,255,255,0.68)}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:var(--text);background:linear-gradient(180deg,var(--bg-grad-start),var(--bg-grad-end));-webkit-font-smoothing:antialiased}

    /* Sidebar (shared) */
    .sidebar-fixed{position:fixed; left:0; top:0; bottom:0; width:260px; padding:22px; background: rgba(8,12,25,0.95); backdrop-filter: blur(20px); border-right:1px solid rgba(255,255,255,0.03); display:flex; flex-direction:column; gap:12px; z-index:20}
    .sidebar-brand{font-weight:800; font-size:24px; background:linear-gradient(90deg,var(--cyan),#9b7cff); -webkit-background-clip:text; color:transparent}
    .profile-card{display:flex;align-items:center;gap:12px;padding:10px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px}
    .avatar{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1px solid rgba(255,255,255,0.04)}
    .name{font-weight:700}
    .role{font-size:13px;color:var(--muted)}

    .nav-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
    .nav-item{display:flex;align-items:center;gap:12px;height:48px;padding:0 14px;border-radius:12px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;text-decoration:none}
    .nav-item:hover{background:rgba(255,255,255,0.03);transform:translateX(4px)}
    .nav-item.active{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.08); box-shadow:0 12px 40px rgba(2,6,23,0.6); position:relative}
    .nav-item.active::before{content:""; position:absolute; left:8px; top:8px; bottom:8px; width:6px; background:linear-gradient(180deg,var(--cyan),#9b7cff); border-radius:6px; box-shadow:0 8px 24px rgba(62,231,255,0.08)}

    main.page{margin-left:280px; padding:32px; min-height:100vh}

    @media (max-width:1000px){ .sidebar-fixed{display:none} .page{margin-left:0} }
  </style>
</head>
{% load static %}
<body>
  {% include 'components/sidebar.html' %}

  {% block content %}{% endblock %}

</body>
  <script>
    // CSRF helper for AJAX/fetch: get CSRF token from cookie
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    window.csrftoken = getCookie('csrftoken');
  </script>
</html>
